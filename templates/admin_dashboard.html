<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f7f7f7;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-top: 50px;
        }
        ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
            text-align: center;
        }
        li {
            display: inline;
            margin: 0 10px;
        }
        li a {
            text-decoration: none;
            color: #333;
            padding: 10px 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #fff;
            transition: background-color 0.3s ease;
        }
        li a:hover {
            background-color: #f0f0f0;
        }
    </style>
</head>
<body>
    <h2>Admin Dashboard</h2>
    <ul>
        <li><a href="/admin/add_flight">Add Flight</a></li>
        <li><a href="/admin/remove_flight">Remove Flight</a></li>
        <li><a href="/admin/view_bookings">View Bookings</a></li>
    </ul>
</body>
</html>
